<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif;
    }

    table {
        width: 500px;
        border-collapse: collapse;
        /* Obrigatório para ter o título da tabela fixo */
        position: relative;
    }

    thead>tr>th {
        /* No título da linha do cabeçalho vou grudar "sticky" */
        position: sticky;
        /* grudar */
        top: 0;
        /* na posição 0 */
        background-color: gray;

    }

    td.num {
        text-align: right;
    }

    caption {
        /* Tamanho da fonte */
        font-size: 1.5em;
        /* Para colocar em negrito */
        font-weight: bold;
        /* Para deixar mais espaçado */
        padding: 10px;
        /* Colocar um fundo no meu caption */
        background-color: lightgray;

    }
</style>

<body>
    <table>
        <caption>

        </caption>
        <thead>
            <tr>
                <!-- Importante colocar o Escopo do título 
                    col - colunas
                    row - linhas 
                -->
                <th scope="col">Estado</th>
                <th scope="col" style="width: 100px">População</th>
                <th>Comando HTML Utilizado</th>
            </tr>

            <thead>
            <tbody>
                <tr>
                    <td>Acre</td>
                    <td class="num">830.018</td>
                    <td>'Negrito' e 'Destacado'</td>
                </tr>
                <tr>]
                    <td>Alagoas</td>
                    <td class="num">3.365.351</td>
                    <td>'itálico</td>






            </tbody>
        </thead>

</body>

</html>
